# Base Retail KYC — reusable ruleset for retail (individual) products.
# Covers the standard KYC journey for individual customers in the UAE.
#
# Rules reference parties by role:
#   role == 1  primary_holder
#   role == 2  joint_holder
#
# For single-holder products, only the primary holder is evaluated.
# For joint accounts, ALL holders (primary + joint) must pass each check.

kind: seed
version: "1.0"

rulesets:
  - id: base-retail-idv
    name: Retail Identity Verification
    description: Identity verification requirements for all account holders
    version: "0.0.1"
    evaluations:
      - name: liveness_check
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.liveness_passed)"
        writes: liveness_passed
        severity: blocking
        category: kyc
        failure_mode: actionable
        resolution: "Please complete the liveness check"

      - name: facial_match
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.facial_match_passed)"
        writes: facial_match_passed
        severity: blocking
        category: kyc
        failure_mode: actionable
        resolution: "Please complete the facial match verification"

      - name: id_document_verified
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.id_documents.exists(d, d.verified && !d.expired))"
        writes: id_document_verified
        severity: blocking
        category: identity
        failure_mode: input_required
        resolution: "Please upload a valid identity document"

  - id: base-retail-screening
    name: Retail Screening
    description: PEP, sanctions, and adverse media screening for all account holders
    version: "0.0.1"
    evaluations:
      - name: pep_screening
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.pep_screening_clear)"
        writes: pep_screening_clear
        severity: blocking
        category: kyc
        failure_mode: manual_review
        resolution: "Pending PEPs screening by compliance team"

      - name: sanctions_screening
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.sanctions_screening_clear)"
        writes: sanctions_screening_clear
        severity: blocking
        category: kyc
        failure_mode: manual_review
        resolution: "Pending sanctions screening by compliance team"

      - name: adverse_media_screening
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.adverse_media_clear)"
        writes: adverse_media_clear
        severity: blocking
        category: kyc
        failure_mode: manual_review
        resolution: "Pending adverse media screening"

  - id: base-retail-address
    name: Retail Address Verification
    description: Residential address verification for all account holders
    version: "0.0.1"
    evaluations:
      - name: residential_address
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.residential_address_validated)"
        writes: residential_address_validated
        severity: blocking
        category: kyc
        failure_mode: input_required
        resolution: "Please provide proof of residential address"

  - id: base-retail-tax
    name: Retail Tax Declarations
    description: Tax residency and FATCA/CRS declarations for all account holders
    version: "0.0.1"
    evaluations:
      - name: tax_residency
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.tax_residency_declared)"
        writes: tax_residency_declared
        severity: blocking
        category: kyc
        failure_mode: actionable
        resolution: "Please declare your tax residency"

      - name: fatca_declaration
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.fatca_declared)"
        writes: fatca_declared
        severity: blocking
        category: kyc
        failure_mode: actionable
        resolution: "Please complete FATCA self-certification"

      - name: crs_declaration
        expression: "input.parties.filter(p, p.role == 1 || p.role == 2).all(p, p.kyc.crs_declared)"
        writes: crs_declared
        severity: blocking
        category: kyc
        failure_mode: actionable
        resolution: "Please complete CRS self-certification"

  - id: base-retail-full-kyc
    name: Retail Full KYC Gate
    description: Composite gate that requires all retail KYC checks to pass
    version: "0.0.1"
    evaluations:
      - name: retail_kyc_complete
        expression: >
          liveness_passed && facial_match_passed && id_document_verified &&
          pep_screening_clear && sanctions_screening_clear && adverse_media_clear &&
          residential_address_validated &&
          tax_residency_declared && fatca_declared && crs_declared
        reads:
          - liveness_passed
          - facial_match_passed
          - id_document_verified
          - pep_screening_clear
          - sanctions_screening_clear
          - adverse_media_clear
          - residential_address_validated
          - tax_residency_declared
          - fatca_declared
          - crs_declared
        writes: retail_kyc_complete
        severity: blocking
        category: readiness
