syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "prodcat/v1/geography.proto";

// RulesetConfig is the eval engine configuration shared across all levels
// of the product hierarchy (family, archetype, product).
// Each level can define its own rules AND reference shared base rulesets.
//
// At evaluation time, the full chain is resolved:
//   base rulesets (family) + family ruleset
//   → base rulesets (archetype) + archetype ruleset
//   → base rulesets (product) + product ruleset
//   → merged and fed to the eval engine.
message RulesetConfig {
  // The eval engine ruleset YAML content for this level.
  bytes ruleset = 1;

  // IDs of shared base rulesets this level inherits.
  // Resolved and merged at evaluation time, before this level's own ruleset.
  // e.g., family "CASA" references ["base-age-verification"]
  //        archetype "Current Account" references ["base-kyc"]
  //        product "AED Current Account" references ["base-contact-verification"]
  repeated string base_ruleset_ids = 2;
}

// EligibilityConfig defines who can subscribe to this product.
// Product-level only — family and archetype use RulesetConfig directly.
message EligibilityConfig {
  // Geographic eligibility.
  GeographicAvailability geographic = 1;

  // Eval engine configuration (own ruleset + base rulesets).
  RulesetConfig rules = 2;

  // Acceptable ID document types for this product.
  repeated AcceptableIDConfig acceptable_ids = 3;

  // Customer segment restrictions.
  repeated CustomerSegment segments = 4;
}

// AcceptableIDConfig defines which ID document types are accepted.
// Evaluated post-scan — the user never selects their ID type upfront.
message AcceptableIDConfig {
  // Specific ID type (e.g., "emirates_id") or category (e.g., "passport").
  string id_type_id = 1;
  // If true, id_type_id is a category — accept all types in that category.
  bool is_category_wildcard = 2;
  // Optional: restrict to IDs issued by specific countries only.
  repeated string issuing_geo_filter = 3;
}

// CustomerSegment restricts the product to certain customer types.
message CustomerSegment {
  string segment_id = 1;
  CustomerType customer_type = 2;
}

enum CustomerType {
  CUSTOMER_TYPE_UNSPECIFIED = 0;
  CUSTOMER_TYPE_INDIVIDUAL = 1;
  CUSTOMER_TYPE_SOLE_PROPRIETOR = 2;
  CUSTOMER_TYPE_SME = 3;
  CUSTOMER_TYPE_CORPORATE = 4;
  CUSTOMER_TYPE_MINOR = 5;
  CUSTOMER_TYPE_NON_RESIDENT = 6;
}
