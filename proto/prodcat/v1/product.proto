syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/laenen-partners/prodcat/gen/prodcat/v1;prodcatv1";

import "entitystore/v1/options.proto";

enum DisabledReason {
    DISABLED_REASON_UNSPECIFIED = 0;
    DISABLED_REASON_DRAFT = 1;
}

// Product defines a product's elegibility configuration.
// The product's operational details (fees, rates, limits) live in core banking.
// This only captures what's needed for eligibility decisions.
message Product {
  option (entitystore.v1.message) = {
    match_thresholds: {auto_match: 0.95, review_zone: 0.80}
    allowed_relations: ["has_ruleset", "parent_of"]
    extraction_display_name: "Product"
  };

  string product_id = 1 [(entitystore.v1.field) = {
    anchor: true
    similarity: SIMILARITY_FUNCTION_EXACT
    weight: 1.0
    normalizer: NORMALIZER_LOWERCASE_TRIM
  }];

  string name = 2 [(entitystore.v1.field) = {
    embed: true
    token_field: true
  }];

  string description = 3 [(entitystore.v1.field) = {
    embed: true
  }];

  DisabledReason disabled_reason = 4;

  repeated string tags = 5;
  string status = 6;
  string parent_product_id = 7;
  repeated string ruleset_ids = 8;

  // Used for additional information like
  // Only-available-contries
  map<string, string> meta = 9;

  // Routing: capability name → provider ID.
  // Keys: "banking", "cards", "screening", "payments", "notifications"
  // Values: provider IDs registered in the adaptor registry.
  map<string, string> routing = 10;

  // Whether multiple subscriptions to this product are allowed per customer.
  // Default (false) means singleton — one subscription per customer.
  bool multi_subscription = 11;
}
