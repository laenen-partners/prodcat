syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "prodcat/v1/types.proto";

// ComplianceConfig captures regulatory metadata and required legal agreements.
message ComplianceConfig {
  // Whether this product is Sharia-compliant.
  bool sharia_compliant = 1;

  // Regulatory classifications for reporting.
  repeated RegulatoryClassification classifications = 2;

  // Legal agreements that must be accepted to use this product.
  repeated LegalAgreement agreements = 3;
}

// RegulatoryClassification for reporting/compliance purposes.
message RegulatoryClassification {
  // Regulator (e.g., "CBUAE", "OCC", "FCA").
  string regulator = 1;
  // Classification code as defined by the regulator.
  string classification_code = 2;
  string classification_name = 3;
}

// LegalAgreement that must be accepted to use the product.
message LegalAgreement {
  string agreement_id = 1;
  AgreementType agreement_type = 2;
  repeated LocalizedText title = 3;
  // Version of the agreement. Change triggers re-acceptance.
  string version = 4;
  // Reference to the full document (URL or storage key).
  string document_ref = 5;
  // Whether this agreement is shared across products (e.g., privacy policy)
  // or product-specific (e.g., account T&C).
  bool shared = 6;
}

enum AgreementType {
  AGREEMENT_TYPE_UNSPECIFIED = 0;
  AGREEMENT_TYPE_TERMS_AND_CONDITIONS = 1;
  AGREEMENT_TYPE_PRIVACY_POLICY = 2;
  AGREEMENT_TYPE_KEY_FACTS_STATEMENT = 3;
  AGREEMENT_TYPE_SHARIAH_COMMODITY_PURCHASE = 4;
  AGREEMENT_TYPE_DATA_PROCESSING = 5;
  AGREEMENT_TYPE_CUSTOM = 99;
}
