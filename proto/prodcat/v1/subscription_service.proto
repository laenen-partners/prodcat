syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "google/protobuf/timestamp.proto";
import "prodcat/v1/subscription.proto";

// SubscriptionService manages customer subscriptions to products.
service SubscriptionService {
  // Start a subscription (begin onboarding for a product).
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);

  // Get a subscription by ID.
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);

  // List subscriptions for a customer.
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);

  // Re-evaluate a subscription against the eval engine.
  // Updates status, capabilities, and disabled states based on current data.
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);

  // Activate a subscription (all requirements met → provision in core banking).
  rpc Activate(ActivateRequest) returns (ActivateResponse);

  // Disable a subscription (with reason).
  rpc Disable(DisableRequest) returns (DisableResponse);

  // Re-enable a previously disabled subscription.
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Cancel a subscription.
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Disable a specific capability on a subscription.
  rpc DisableCapability(DisableCapabilityRequest) returns (DisableCapabilityResponse);

  // Re-enable a specific capability on a subscription.
  rpc EnableCapability(EnableCapabilityRequest) returns (EnableCapabilityResponse);

  // Check access status for all active subscriptions of a customer.
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
}

// --- Subscribe ---
message SubscribeRequest {
  string customer_id = 1;
  string product_id = 2;
}
message SubscribeResponse {
  Subscription subscription = 1;
}

// --- GetSubscription ---
message GetSubscriptionRequest {
  string subscription_id = 1;
}
message GetSubscriptionResponse {
  Subscription subscription = 1;
}

// --- ListSubscriptions ---
message ListSubscriptionsRequest {
  string customer_id = 1;
  SubscriptionStatus status = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  string next_page_token = 2;
}

// --- Evaluate ---
message EvaluateRequest {
  string subscription_id = 1;
}
message EvaluateResponse {
  Subscription subscription = 1;
  repeated EvalDelta deltas = 2;
  // Capabilities whose status changed as a result of this evaluation.
  repeated CapabilityDelta capability_deltas = 3;
}

message EvalDelta {
  string evaluation_name = 1;
  bool previously_passed = 2;
  bool now_passed = 3;
}

message CapabilityDelta {
  string capability_id = 1;
  CapabilityStatus previous_status = 2;
  CapabilityStatus current_status = 3;
  // If newly disabled, the reason.
  DisabledReason reason = 4;
}

// --- Activate ---
message ActivateRequest {
  string subscription_id = 1;
  // External reference from the core banking system.
  string external_ref = 2;
  // Initial capabilities to enable. If empty, all default capabilities are enabled.
  repeated CapabilityType capabilities = 3;
}
message ActivateResponse {
  Subscription subscription = 1;
}

// --- Disable / Enable subscription ---
message DisableRequest {
  string subscription_id = 1;
  DisabledReason reason = 2;
  string message = 3;
}
message DisableResponse {
  Subscription subscription = 1;
}

message EnableRequest {
  string subscription_id = 1;
}
message EnableResponse {
  Subscription subscription = 1;
}

// --- Cancel ---
message CancelRequest {
  string subscription_id = 1;
  string reason = 2;
}
message CancelResponse {
  Subscription subscription = 1;
}

// --- Disable / Enable capability ---
message DisableCapabilityRequest {
  string subscription_id = 1;
  string capability_id = 2;
  DisabledReason reason = 3;
  string message = 4;
}
message DisableCapabilityResponse {
  Subscription subscription = 1;
}

message EnableCapabilityRequest {
  string subscription_id = 1;
  string capability_id = 2;
}
message EnableCapabilityResponse {
  Subscription subscription = 1;
}

// --- CheckAccess ---
message CheckAccessRequest {
  string customer_id = 1;
}
message CheckAccessResponse {
  repeated SubscriptionAccess statuses = 1;
}

message SubscriptionAccess {
  string subscription_id = 1;
  string product_id = 2;
  SubscriptionStatus status = 3;
  DisabledState disabled = 4;
  // Per-capability status.
  repeated Capability capabilities = 5;
}
