syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "google/protobuf/timestamp.proto";
import "prodcat/v1/subscription.proto";

// SubscriptionService manages subscriptions to products.
// Supports retail (single holder), joint accounts, and SME.
service SubscriptionService {
  // Start a subscription (begin onboarding for a product).
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);

  // Get a subscription by ID.
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);

  // List subscriptions for a customer (as any party role) or entity.
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);

  // Re-evaluate a subscription against the eval engine.
  // Runs entity-level eval (if business) + per-party eval for all parties.
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);

  // Activate a subscription (all requirements met → provision in core banking).
  rpc Activate(ActivateRequest) returns (ActivateResponse);

  // Disable / Enable a subscription.
  rpc Disable(DisableRequest) returns (DisableResponse);
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Cancel a subscription.
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Disable / Enable a specific capability.
  rpc DisableCapability(DisableCapabilityRequest) returns (DisableCapabilityResponse);
  rpc EnableCapability(EnableCapabilityRequest) returns (EnableCapabilityResponse);

  // ─── Party Management ───
  // Add a party to a subscription (e.g., add joint holder, add UBO).
  rpc AddParty(AddPartyRequest) returns (AddPartyResponse);
  // Remove a party from a subscription.
  rpc RemoveParty(RemovePartyRequest) returns (RemovePartyResponse);
  // Re-evaluate a single party's requirements.
  rpc EvaluateParty(EvaluatePartyRequest) returns (EvaluatePartyResponse);

  // ─── Signing Authority ───
  // Update the signing authority rules for a subscription.
  rpc UpdateSigningAuthority(UpdateSigningAuthorityRequest) returns (UpdateSigningAuthorityResponse);

  // Check access status for all subscriptions of a customer or entity.
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
}

// --- Subscribe ---
message SubscribeRequest {
  // The entity that owns the subscription.
  // For retail: this is the individual customer ID.
  // For SME: this is the business entity ID.
  string entity_id = 1;
  EntityType entity_type = 2;
  string product_id = 3;

  // Initial parties. For retail, at minimum the primary holder.
  // For SME, authorized signatories and/or UBOs.
  repeated PartyInput initial_parties = 4;

  // Signing authority. Defaults to ANY_ONE for retail.
  SigningAuthority signing_authority = 5;
}

message PartyInput {
  string customer_id = 1;
  PartyRole role = 2;
}

message SubscribeResponse {
  Subscription subscription = 1;
}

// --- GetSubscription ---
message GetSubscriptionRequest {
  string subscription_id = 1;
}
message GetSubscriptionResponse {
  Subscription subscription = 1;
}

// --- ListSubscriptions ---
message ListSubscriptionsRequest {
  // Filter by entity (business or individual).
  string entity_id = 1;
  // Or filter by customer_id (finds all subscriptions where this person is a party).
  string customer_id = 2;
  SubscriptionStatus status = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  string next_page_token = 2;
}

// --- Evaluate ---
message EvaluateRequest {
  string subscription_id = 1;
}
message EvaluateResponse {
  Subscription subscription = 1;
  // Changes at the subscription/entity level.
  repeated EvalDelta deltas = 2;
  repeated CapabilityDelta capability_deltas = 3;
  // Changes at the party level.
  repeated PartyEvalDelta party_deltas = 4;
}

message EvalDelta {
  string evaluation_name = 1;
  bool previously_passed = 2;
  bool now_passed = 3;
}

message CapabilityDelta {
  string capability_id = 1;
  CapabilityStatus previous_status = 2;
  CapabilityStatus current_status = 3;
  DisabledReason reason = 4;
}

message PartyEvalDelta {
  string party_id = 1;
  string customer_id = 2;
  repeated EvalDelta deltas = 3;
  // Whether this party's requirements_met flag changed.
  bool previously_met = 4;
  bool now_met = 5;
}

// --- Activate ---
message ActivateRequest {
  string subscription_id = 1;
  string external_ref = 2;
  repeated CapabilityType capabilities = 3;
}
message ActivateResponse {
  Subscription subscription = 1;
}

// --- Disable / Enable subscription ---
message DisableRequest {
  string subscription_id = 1;
  DisabledReason reason = 2;
  string message = 3;
}
message DisableResponse {
  Subscription subscription = 1;
}

message EnableRequest {
  string subscription_id = 1;
}
message EnableResponse {
  Subscription subscription = 1;
}

// --- Cancel ---
message CancelRequest {
  string subscription_id = 1;
  string reason = 2;
}
message CancelResponse {
  Subscription subscription = 1;
}

// --- Disable / Enable capability ---
message DisableCapabilityRequest {
  string subscription_id = 1;
  string capability_id = 2;
  DisabledReason reason = 3;
  string message = 4;
}
message DisableCapabilityResponse {
  Subscription subscription = 1;
}

message EnableCapabilityRequest {
  string subscription_id = 1;
  string capability_id = 2;
}
message EnableCapabilityResponse {
  Subscription subscription = 1;
}

// --- Party Management ---
message AddPartyRequest {
  string subscription_id = 1;
  string customer_id = 2;
  PartyRole role = 3;
}
message AddPartyResponse {
  Subscription subscription = 1;
  // Initial eval state for the new party (what they need to complete).
  Party party = 2;
}

message RemovePartyRequest {
  string subscription_id = 1;
  string party_id = 2;
  string reason = 3;
}
message RemovePartyResponse {
  Subscription subscription = 1;
}

message EvaluatePartyRequest {
  string subscription_id = 1;
  string party_id = 2;
}
message EvaluatePartyResponse {
  Party party = 1;
  repeated EvalDelta deltas = 2;
}

// --- Signing Authority ---
message UpdateSigningAuthorityRequest {
  string subscription_id = 1;
  SigningAuthority signing_authority = 2;
}
message UpdateSigningAuthorityResponse {
  Subscription subscription = 1;
}

// --- CheckAccess ---
message CheckAccessRequest {
  // Check by entity (all subscriptions for a business or individual).
  string entity_id = 1;
  // Or check by customer (all subscriptions where this person is a party).
  string customer_id = 2;
}
message CheckAccessResponse {
  repeated SubscriptionAccess statuses = 1;
}

message SubscriptionAccess {
  string subscription_id = 1;
  string product_id = 2;
  SubscriptionStatus status = 3;
  DisabledState disabled = 4;
  repeated Capability capabilities = 5;
  // Per-party status summary.
  repeated PartyAccessStatus party_statuses = 6;
}

message PartyAccessStatus {
  string party_id = 1;
  string customer_id = 2;
  PartyRole role = 3;
  bool requirements_met = 4;
  DisabledState disabled = 5;
}
