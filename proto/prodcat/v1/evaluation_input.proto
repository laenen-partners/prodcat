syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "google/protobuf/timestamp.proto";

// EvaluationInput is the protobuf message passed to the eval engine.
// It contains all customer data needed to evaluate eligibility for any product.
//
// Usage:
//   cfg, _ := evalengine.LoadDefinitions(mergedRulesetYAML)
//   engine, _ := evalengine.NewEngine(cfg, &EvaluationInput{})
//   results := engine.Run(input)
//
// CEL expressions reference fields as input.contacts, input.age, etc.
message EvaluationInput {
  // ─── Contact Information ───
  repeated Contact contacts = 1;

  // ─── Security ───
  bool mpin_created = 2;

  // ─── Identity & Verification ───
  repeated IdentityDocument id_documents = 3;
  bool liveness_passed = 4;
  // Derived from id_document DOB. Age in whole years at evaluation time.
  int32 age = 5;
  // All nationalities from scanned documents (supports dual citizenship).
  repeated string nationalities = 6;

  // ─── KYC Profile ───
  Address residential_address = 7;
  Document proof_of_address = 8;
  string employment_status = 9;
  string income_range = 10;
  repeated string income_sources = 11;
  repeated string tax_residency_countries = 12;
  string tin_1 = 13;
  string tin_2 = 14;
  string tin_3 = 15;
  string tin_4 = 16;
  // null-safe: use has(input.pep_declared) in CEL to check if declared.
  optional bool pep_declared = 17;
  bool professional_investor = 18;
  // "low", "medium", "high"
  string risk_tolerance = 19;

  // ─── Risk (system-sourced) ───
  // Customer risk score from Oscilar (0-100).
  int32 risk_score = 20;

  // ─── EDD (Enhanced Due Diligence) ───
  string source_of_wealth = 21;
  repeated Document source_of_wealth_docs = 22;
  string source_of_funds = 23;
  string purpose_of_product = 24;
  string business_ownership = 25;

  // ─── Legal Agreements ───
  repeated Agreement agreements = 26;

  // ─── Additional Identity Documents ───
  repeated Document additional_id_documents = 27;

  // ─── Context ───
  // ISO 3166-1 alpha-2 country code derived from phone country code.
  string country = 28;
  // Customer segment.
  string customer_type = 29;
}

// Contact represents a verified contact method (email, phone).
message Contact {
  ContactType type = 1;
  string value = 2;
  bool primary = 3;
  bool verified = 4;
  google.protobuf.Timestamp verified_at = 5;
}

enum ContactType {
  CONTACT_TYPE_UNSPECIFIED = 0;
  CONTACT_TYPE_EMAIL = 2;
  CONTACT_TYPE_PHONE = 3;
}

// IdentityDocument represents a scanned identity document.
message IdentityDocument {
  // Document type identifier (e.g., "emirates_id", "international_passport",
  // "gcc_national_id", "national_id_card").
  string type = 1;
  bool scanned = 2;
  bool expired = 3;

  // OCR / extracted fields.
  string document_number = 4;
  string full_name = 5;
  string date_of_birth = 6;
  string gender = 7;
  string city_of_birth = 8;
  string country_of_birth = 9;
  // Supports multiple nationalities from a single document.
  repeated string nationalities = 10;
  google.protobuf.Timestamp issue_date = 11;
  google.protobuf.Timestamp expiry_date = 12;
  // ISO 3166-1 alpha-2 code of the issuing country.
  string issuing_country = 13;
}

// Address represents a structured residential address.
message Address {
  string address_line_1 = 1;
  string address_line_2 = 2;
  string city = 3;
  string state_province = 4;
  string post_code = 5;
  // ISO 3166-1 alpha-2 country code.
  string country = 6;
}

// Agreement represents a legal agreement acceptance.
message Agreement {
  // Agreement type identifier matching the product's LegalAgreement.
  // e.g., "aed_ca_tc", "privacy_policy", "key_facts", "shariah_commodity".
  string type = 1;
  bool accepted = 2;
  // Version of the agreement that was accepted.
  string version = 3;
  google.protobuf.Timestamp accepted_at = 4;
}

// Document represents an uploaded document (proof of address, source of wealth docs, etc.).
message Document {
  string document_type = 1;
  bool uploaded = 2;
  bool verified = 3;
  google.protobuf.Timestamp uploaded_at = 4;
  google.protobuf.Timestamp expiry_date = 5;
}
