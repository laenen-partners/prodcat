syntax = "proto3";

package prodcat.v1;

option go_package = "github.com/plaenen/prodcat/gen/prodcat/v1;prodcatv1";

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "prodcat/v1/product.proto";
import "prodcat/v1/eligibility.proto";

// ProductCatalogService manages the product hierarchy and eval engine rulesets.
//
// Evaluation hierarchy (each level gates everything below it):
//   Family → Archetype → Product
//
// e.g., Family "Investments" has ruleset: input.age >= 18
//       Archetype "Wealth Management" has ruleset: input.professional_investor == true
//       Product "Global Wealth AED" has ruleset: (product-specific onboarding steps)
//
// At evaluation time, all three levels are merged and fed to the eval engine.
service ProductCatalogService {
  // Family management.
  rpc CreateFamily(CreateFamilyRequest) returns (CreateFamilyResponse);
  rpc GetFamily(GetFamilyRequest) returns (GetFamilyResponse);
  rpc ListFamilies(ListFamiliesRequest) returns (ListFamiliesResponse);
  rpc UpdateFamily(UpdateFamilyRequest) returns (UpdateFamilyResponse);

  // Archetype management.
  rpc CreateArchetype(CreateArchetypeRequest) returns (CreateArchetypeResponse);
  rpc GetArchetype(GetArchetypeRequest) returns (GetArchetypeResponse);
  rpc ListArchetypes(ListArchetypesRequest) returns (ListArchetypesResponse);
  rpc UpdateArchetype(UpdateArchetypeRequest) returns (UpdateArchetypeResponse);

  // Product CRUD.
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc TransitionProductStatus(TransitionProductStatusRequest) returns (TransitionProductStatusResponse);

  // Shared base rulesets (reusable across any level).
  rpc CreateBaseRuleset(CreateBaseRulesetRequest) returns (CreateBaseRulesetResponse);
  rpc GetBaseRuleset(GetBaseRulesetRequest) returns (GetBaseRulesetResponse);
  rpc ListBaseRulesets(ListBaseRulesetsRequest) returns (ListBaseRulesetsResponse);
  rpc UpdateBaseRuleset(UpdateBaseRulesetRequest) returns (UpdateBaseRulesetResponse);

  // Product discovery: geographic + segment filtering.
  rpc ListAvailableProducts(ListAvailableProductsRequest) returns (ListAvailableProductsResponse);

  // Resolve the full merged ruleset for a product (family + archetype + base + product).
  rpc ResolveProductRuleset(ResolveProductRulesetRequest) returns (ResolveProductRulesetResponse);
}

// --- Family ---
message CreateFamilyRequest {
  ProductFamilyDefinition family = 1;
}
message CreateFamilyResponse {
  ProductFamilyDefinition family = 1;
  RulesetValidation validation = 2;
}

message GetFamilyRequest {
  string family_id = 1;
}
message GetFamilyResponse {
  ProductFamilyDefinition family = 1;
}

message ListFamiliesRequest {}
message ListFamiliesResponse {
  repeated ProductFamilyDefinition families = 1;
}

message UpdateFamilyRequest {
  ProductFamilyDefinition family = 1;
  google.protobuf.FieldMask update_mask = 2;
}
message UpdateFamilyResponse {
  ProductFamilyDefinition family = 1;
  RulesetValidation validation = 2;
}

// --- Archetypes ---
message CreateArchetypeRequest {
  ProductArchetype archetype = 1;
}
message CreateArchetypeResponse {
  ProductArchetype archetype = 1;
  RulesetValidation validation = 2;
}

message GetArchetypeRequest {
  string archetype_id = 1;
}
message GetArchetypeResponse {
  ProductArchetype archetype = 1;
}

message ListArchetypesRequest {
  string family_id = 1;
}
message ListArchetypesResponse {
  repeated ProductArchetype archetypes = 1;
}

message UpdateArchetypeRequest {
  ProductArchetype archetype = 1;
  google.protobuf.FieldMask update_mask = 2;
}
message UpdateArchetypeResponse {
  ProductArchetype archetype = 1;
  RulesetValidation validation = 2;
}

// --- Products ---
message CreateProductRequest {
  Product product = 1;
}
message CreateProductResponse {
  Product product = 1;
  RulesetValidation validation = 2;
}

message GetProductRequest {
  string product_id = 1;
  google.protobuf.Timestamp as_of = 2;
}
message GetProductResponse {
  Product product = 1;
}

message ListProductsRequest {
  string archetype_id = 1;
  string family_id = 2;
  ProductStatus status = 3;
  string currency_code = 4;
  string country_code = 5;
  int32 page_size = 10;
  string page_token = 11;
}
message ListProductsResponse {
  repeated Product products = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message UpdateProductRequest {
  Product product = 1;
  google.protobuf.FieldMask update_mask = 2;
}
message UpdateProductResponse {
  Product product = 1;
  RulesetValidation validation = 2;
}

message TransitionProductStatusRequest {
  string product_id = 1;
  ProductStatus target_status = 2;
  string reason = 3;
}
message TransitionProductStatusResponse {
  Product product = 1;
}

// --- Base Rulesets ---
// Shared eval engine rulesets reusable across any level of the hierarchy.
// e.g., "base-contact-verification" with email_verified + phone_verified + mpin_created.

message BaseRuleset {
  string ruleset_id = 1;
  string name = 2;
  string description = 3;
  bytes content = 4;
  string version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateBaseRulesetRequest {
  BaseRuleset ruleset = 1;
}
message CreateBaseRulesetResponse {
  BaseRuleset ruleset = 1;
  RulesetValidation validation = 2;
}

message GetBaseRulesetRequest {
  string ruleset_id = 1;
}
message GetBaseRulesetResponse {
  BaseRuleset ruleset = 1;
}

message ListBaseRulesetsRequest {}
message ListBaseRulesetsResponse {
  repeated BaseRuleset rulesets = 1;
}

message UpdateBaseRulesetRequest {
  BaseRuleset ruleset = 1;
  string change_reason = 2;
}
message UpdateBaseRulesetResponse {
  BaseRuleset ruleset = 1;
  RulesetValidation validation = 2;
}

// --- Ruleset Validation ---
message RulesetValidation {
  bool valid = 1;
  repeated string errors = 2;
  repeated string warnings = 3;
  int32 evaluation_count = 4;
  int32 max_depth = 5;
}

// --- Product Discovery ---
message ListAvailableProductsRequest {
  string country_code = 1;
  CustomerType customer_type = 2;
  ProductFamily family = 3;
}
message ListAvailableProductsResponse {
  repeated Product products = 1;
}

// --- Resolve Merged Ruleset ---
// Returns the full eval engine ruleset for a product, merging all layers:
// base rulesets → family ruleset → archetype ruleset → product ruleset.
// This is what the onboarding service calls to get the complete set of
// evaluations to feed to the eval engine.
message ResolveProductRulesetRequest {
  string product_id = 1;
}
message ResolveProductRulesetResponse {
  string product_id = 1;
  // The merged YAML content ready for the eval engine.
  bytes merged_ruleset = 2;
  // Validation of the merged ruleset (catches cross-layer issues like
  // circular dependencies between family and product evaluations).
  RulesetValidation validation = 3;
  // Which layers contributed evaluations.
  repeated RulesetLayer layers = 4;
}

message RulesetLayer {
  // Where this layer comes from.
  RulesetLayerSource source = 1;
  // ID of the entity (family_id, archetype_id, product_id, or base_ruleset_id).
  string source_id = 2;
  // Number of evaluations contributed by this layer.
  int32 evaluation_count = 3;
}

enum RulesetLayerSource {
  RULESET_LAYER_SOURCE_UNSPECIFIED = 0;
  RULESET_LAYER_SOURCE_BASE = 1;
  RULESET_LAYER_SOURCE_FAMILY = 2;
  RULESET_LAYER_SOURCE_ARCHETYPE = 3;
  RULESET_LAYER_SOURCE_PRODUCT = 4;
}
