syntax = "proto3";

package eligibility.v1;

option go_package = "github.com/laenen-partners/prodcat/gen/eligibility/v1;eligibilityv1";

import "entitystore/v1/options.proto";

// SeedRecord tracks which seed files have been applied.
message SeedRecord {
  option (entitystore.v1.message) = {
    match_thresholds: {auto_match: 0.95, review_zone: 0.80}
    extraction_display_name: "SeedRecord"
  };

  // Seed filename (e.g. "2026031801_mal_subscription.yaml").
  string filename = 1 [(entitystore.v1.field) = {
    anchor: true
    similarity: SIMILARITY_FUNCTION_EXACT
    weight: 1.0
    normalizer: NORMALIZER_LOWERCASE_TRIM
  }];

  // SHA-256 checksum of the seed file content.
  string checksum = 2;

  // ISO 8601 timestamp of when the seed was applied.
  string applied_at = 3;
}
