version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "gen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "jsonb"
            go_type: "map[string]string"
          - db_type: "pg_catalog.text[]"
            go_type: "[]string"
          - db_type: "product_family"
            go_type:
              type: "ProductFamily"
              import: ""
          - db_type: "product_status"
            go_type:
              type: "ProductStatus"
              import: ""
          - db_type: "product_type"
            go_type:
              type: "ProductType"
              import: ""
          - db_type: "availability_mode"
            go_type:
              type: "AvailabilityMode"
              import: ""
          - db_type: "entity_type"
            go_type:
              type: "EntityType"
              import: ""
          - db_type: "subscription_status"
            go_type:
              type: "SubscriptionStatus"
              import: ""
          - db_type: "party_role"
            go_type:
              type: "PartyRole"
              import: ""
          - db_type: "signing_rule"
            go_type:
              type: "SigningRule"
              import: ""
          - db_type: "capability_type"
            go_type:
              type: "CapabilityType"
              import: ""
          - db_type: "capability_status"
            go_type:
              type: "CapabilityStatus"
              import: ""
          - db_type: "disabled_reason"
            go_type:
              type: "DisabledReason"
              import: ""
