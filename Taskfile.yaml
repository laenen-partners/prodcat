version: "3"

env:
  GOPRIVATE: github.com/laenen-partners/*
  GONOSUMCHECK: github.com/laenen-partners/*

tasks:
  setup:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  build:
    desc: Build the Go project
    cmds:
      - go build ./...

  generate:
    desc: Run generations
    cmds:
      - task: generate:proto

  generate:proto:
    desc: Run proto generate
    cmds:
      - buf generate

  format:
    desc: Format Go code with gofmt
    cmds:
      - gofumpt -l -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:ci:
    desc: Run tests and output JUnit XML to reports/junit.xml
    cmds:
      - mkdir -p reports
      - gotestsum --junitfile reports/junit.xml ./...

  report:
    desc: Generate evaluation report (trial/EVAL_REPORT.md)
    cmds:
      - go test ./trial/ -run TestGenerateEvalReport -count=1 -timeout 300s

  vuln:ci:
    desc: Run osv-scanner vulnerability scan
    cmds:
      - osv-scanner scan -r .

  showcase:
    desc: Run the prodcat UI showcase (requires Docker for PostgreSQL)
    dir: ui
    cmds:
      - templ generate
      - go run ./cmd/showcase

  ci:
    desc: Run the full CI pipeline
    cmds:
      - task setup
      - task generate
      - task format
      - task lint
      - task build
      - task test:ci
      - task vuln:ci
